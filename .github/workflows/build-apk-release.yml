name: Build APK Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: -Dorg.gradle.daemon=false

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode release keystore (optional)
        if: ${{ secrets.RELEASE_STORE_FILE_BASE64 != '' }}
        env:
          RELEASE_STORE_FILE_BASE64: ${{ secrets.RELEASE_STORE_FILE_BASE64 }}
        run: |
          echo "$RELEASE_STORE_FILE_BASE64" | base64 -d > "$RUNNER_TEMP/release-keystore.jks"
          test -s "$RUNNER_TEMP/release-keystore.jks"

      - name: Create local.properties for CI
        env:
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          {
            echo "GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}"
            echo "GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}"

            if [[ -f "$RUNNER_TEMP/release-keystore.jks" ]]; then
              echo "RELEASE_STORE_FILE=$RUNNER_TEMP/release-keystore.jks"
              echo "RELEASE_STORE_PASSWORD=${RELEASE_STORE_PASSWORD}"
              echo "RELEASE_KEY_ALIAS=${RELEASE_KEY_ALIAS}"
              echo "RELEASE_KEY_PASSWORD=${RELEASE_KEY_PASSWORD}"
            fi
          } > local.properties

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: operit-release-apk-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
