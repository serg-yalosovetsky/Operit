name: Build APK Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  # JDK 21 is required: the `io.github.kyant0:backdrop` dependency is compiled with
  # class file major version 65 (Java 21), which kapt under JDK 17 cannot read.
  JAVA_VERSION: '21'
  GRADLE_OPTS: -Dorg.gradle.daemon=false
  # Release tag of this repo whose assets host the vendored binary archives
  # (libs.zip, jniLibs.zip, models.zip, subpack.zip). Bump when the assets change.
  VENDOR_ASSETS_TAG: vendor-assets-2026-03

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Fetch vendored binary assets from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p gdrive_dependencies
          for zip in libs.zip jniLibs.zip models.zip subpack.zip; do
            echo "Downloading $zip from release $VENDOR_ASSETS_TAG"
            gh release download "$VENDOR_ASSETS_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "$zip" \
              --dir gdrive_dependencies \
              --clobber
          done

      - name: Extract vendored binary assets
        run: |
          set -euo pipefail
          for zip in gdrive_dependencies/libs.zip \
                     gdrive_dependencies/jniLibs.zip \
                     gdrive_dependencies/models.zip \
                     gdrive_dependencies/subpack.zip; do
            echo "Extracting $zip"
            unzip -oq "$zip" -d .
          done
          test -f app/libs/ffmpeg-kit-local.aar

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Fetch vendored binary assets from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p gdrive_dependencies
          for zip in libs.zip jniLibs.zip models.zip subpack.zip; do
            echo "Downloading $zip from release $VENDOR_ASSETS_TAG"
            gh release download "$VENDOR_ASSETS_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "$zip" \
              --dir gdrive_dependencies \
              --clobber
          done

      - name: Extract vendored binary assets
        run: |
          set -euo pipefail
          for zip in gdrive_dependencies/libs.zip \
                     gdrive_dependencies/jniLibs.zip \
                     gdrive_dependencies/models.zip \
                     gdrive_dependencies/subpack.zip; do
            echo "Extracting $zip"
            unzip -oq "$zip" -d .
          done
          test -f app/libs/ffmpeg-kit-local.aar

      - name: Decode release keystore (optional)
        if: ${{ secrets.RELEASE_STORE_FILE_BASE64 != '' }}
        env:
          RELEASE_STORE_FILE_BASE64: ${{ secrets.RELEASE_STORE_FILE_BASE64 }}
        run: |
          echo "$RELEASE_STORE_FILE_BASE64" | base64 -d > "$RUNNER_TEMP/release-keystore.jks"
          test -s "$RUNNER_TEMP/release-keystore.jks"

      - name: Create local.properties for CI
        env:
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          {
            echo "GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}"
            echo "GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}"

            if [[ -f "$RUNNER_TEMP/release-keystore.jks" ]]; then
              echo "RELEASE_STORE_FILE=$RUNNER_TEMP/release-keystore.jks"
              echo "RELEASE_STORE_PASSWORD=${RELEASE_STORE_PASSWORD}"
              echo "RELEASE_KEY_ALIAS=${RELEASE_KEY_ALIAS}"
              echo "RELEASE_KEY_PASSWORD=${RELEASE_KEY_PASSWORD}"
            fi
          } > local.properties

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: operit-release-apk-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
